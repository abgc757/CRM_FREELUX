<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manual Interactivo — CRM FreeLux</title>
<style>
  :root {
    --orange: #f97316; --orange-dark: #ea580c; --orange-light: #fed7aa;
    --bg: #0f172a; --bg2: #1e293b; --bg3: #334155;
    --text: #f1f5f9; --text2: #94a3b8; --text3: #cbd5e1;
    --green: #22c55e; --blue: #3b82f6; --purple: #a855f7;
    --yellow: #eab308; --red: #ef4444; --cyan: #06b6d4;
    --border: #334155;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background:var(--bg); color:var(--text); display:flex; height:100vh; overflow:hidden; }

  /* SIDEBAR */
  #sidebar { width:280px; min-width:280px; background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; overflow:hidden; }
  #sidebar-header { padding:16px; border-bottom:1px solid var(--border); }
  #sidebar-header h1 { font-size:14px; font-weight:700; color:var(--orange); letter-spacing:.05em; }
  #sidebar-header p { font-size:11px; color:var(--text2); margin-top:2px; }
  #search-box { margin:10px 12px; position:relative; }
  #search-box input { width:100%; background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:7px 10px 7px 30px; font-size:12px; color:var(--text); outline:none; }
  #search-box input:focus { border-color:var(--orange); }
  #search-box svg { position:absolute; left:9px; top:50%; transform:translateY(-50%); opacity:.4; }
  #filter-tabs { display:flex; gap:4px; padding:0 12px 8px; flex-wrap:wrap; }
  .filter-tab { font-size:10px; padding:3px 8px; border-radius:12px; border:1px solid var(--border); background:transparent; color:var(--text2); cursor:pointer; transition:.15s; }
  .filter-tab:hover, .filter-tab.active { background:var(--orange); border-color:var(--orange); color:#fff; }
  #file-tree { flex:1; overflow-y:auto; padding-bottom:20px; }
  #file-tree::-webkit-scrollbar { width:4px; } #file-tree::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:4px; }

  .tree-group { margin-bottom:2px; }
  .tree-group-header { display:flex; align-items:center; gap:6px; padding:6px 12px; cursor:pointer; font-size:11px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.06em; user-select:none; }
  .tree-group-header:hover { color:var(--text); }
  .tree-group-header .chevron { transition:.2s; font-size:9px; }
  .tree-group-header.open .chevron { transform:rotate(90deg); }
  .tree-group-body { display:none; }
  .tree-group-body.open { display:block; }

  .tree-section { margin-left:12px; margin-bottom:2px; }
  .tree-section-label { font-size:10px; color:var(--text2); padding:4px 12px 2px; opacity:.6; }

  .file-item { display:flex; align-items:center; gap:8px; padding:5px 12px 5px 20px; cursor:pointer; border-radius:4px; margin:1px 4px; transition:.1s; font-size:12px; color:var(--text3); }
  .file-item:hover { background:var(--bg3); color:var(--text); }
  .file-item.active { background:var(--orange); color:#fff; }
  .file-item .badge { margin-left:auto; font-size:9px; padding:1px 5px; border-radius:8px; white-space:nowrap; }
  .badge-api { background:#1d4ed8; color:#bfdbfe; }
  .badge-model { background:#5b21b6; color:#ddd6fe; }
  .badge-service { background:#065f46; color:#a7f3d0; }
  .badge-page { background:#78350f; color:#fed7aa; }
  .badge-config { background:#374151; color:#d1d5db; }
  .badge-migration { background:#1e3a5f; color:#93c5fd; }
  .badge-template { background:#4a1d96; color:#e9d5ff; }

  /* MAIN */
  #main { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  #topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:10px 20px; display:flex; align-items:center; gap:12px; }
  #breadcrumb { font-size:12px; color:var(--text2); display:flex; align-items:center; gap:6px; flex:1; overflow:hidden; white-space:nowrap; }
  #breadcrumb span { color:var(--orange); font-weight:600; }
  #copy-path-btn { font-size:11px; padding:4px 10px; background:var(--bg3); border:1px solid var(--border); border-radius:5px; color:var(--text2); cursor:pointer; white-space:nowrap; }
  #copy-path-btn:hover { border-color:var(--orange); color:var(--orange); }

  #content { flex:1; overflow-y:auto; padding:24px; }
  #content::-webkit-scrollbar { width:5px; } #content::-webkit-scrollbar-thumb { background:var(--bg3); border-radius:4px; }

  /* WELCOME */
  #welcome { max-width:900px; margin:0 auto; }
  .stats-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px; margin:20px 0; }
  .stat-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; padding:14px; text-align:center; }
  .stat-card .num { font-size:26px; font-weight:700; color:var(--orange); }
  .stat-card .lbl { font-size:11px; color:var(--text2); margin-top:2px; }
  .tech-pills { display:flex; flex-wrap:wrap; gap:6px; margin:12px 0; }
  .tech-pill { font-size:11px; padding:3px 10px; border-radius:12px; border:1px solid; }

  /* FILE DETAIL */
  #file-detail { max-width:900px; }
  .file-header { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:20px 24px; margin-bottom:20px; }
  .file-header h2 { font-size:18px; font-weight:700; color:var(--text); display:flex; align-items:center; gap:10px; }
  .file-header .file-path { font-family:monospace; font-size:12px; color:var(--orange); margin-top:6px; background:var(--bg); padding:6px 10px; border-radius:5px; display:inline-block; }
  .file-header .desc { font-size:13px; color:var(--text2); margin-top:10px; line-height:1.6; }
  .file-header .meta-row { display:flex; gap:16px; margin-top:12px; flex-wrap:wrap; }
  .meta-item { font-size:11px; color:var(--text2); display:flex; align-items:center; gap:5px; }
  .meta-item strong { color:var(--text3); }

  .section-card { background:var(--bg2); border:1px solid var(--border); border-radius:8px; margin-bottom:16px; overflow:hidden; }
  .section-card h3 { font-size:12px; font-weight:600; color:var(--text2); text-transform:uppercase; letter-spacing:.06em; padding:10px 16px; border-bottom:1px solid var(--border); background:var(--bg3); display:flex; align-items:center; gap:8px; }
  .section-card-body { padding:14px 16px; }

  .func-list { list-style:none; }
  .func-item { padding:8px 0; border-bottom:1px solid var(--border); display:flex; gap:12px; align-items:flex-start; }
  .func-item:last-child { border-bottom:none; }
  .func-name { font-family:monospace; font-size:12px; color:var(--cyan); min-width:180px; }
  .func-desc { font-size:12px; color:var(--text2); line-height:1.5; }

  .endpoint-item { padding:7px 0; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:flex-start; }
  .endpoint-item:last-child { border-bottom:none; }
  .method { font-size:10px; font-weight:700; padding:2px 6px; border-radius:4px; min-width:42px; text-align:center; }
  .GET { background:#14532d; color:#86efac; } .POST { background:#1e3a5f; color:#93c5fd; }
  .PUT { background:#451a03; color:#fdba74; } .DELETE { background:#4c0519; color:#fca5a5; }
  .PATCH { background:#3b0764; color:#d8b4fe; }
  .endpoint-path { font-family:monospace; font-size:12px; color:var(--text3); }
  .endpoint-desc { font-size:12px; color:var(--text2); margin-left:auto; text-align:right; max-width:260px; }

  .dep-tag { display:inline-flex; align-items:center; gap:4px; font-size:11px; padding:3px 8px; border-radius:12px; border:1px solid var(--border); margin:3px; color:var(--text2); }

  .action-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .action-card { background:var(--bg3); border-radius:7px; padding:12px; border:1px solid var(--border); }
  .action-card h4 { font-size:11px; font-weight:600; color:var(--orange); margin-bottom:6px; }
  .action-card p { font-size:11px; color:var(--text2); line-height:1.5; }
  .action-card code { font-family:monospace; font-size:10px; background:var(--bg); padding:1px 4px; border-radius:3px; color:var(--cyan); }

  .warn-box { background:#2d1b00; border:1px solid #92400e; border-radius:7px; padding:10px 14px; font-size:12px; color:#fbbf24; margin-bottom:12px; }
  .info-box { background:#0c2340; border:1px solid #1d4ed8; border-radius:7px; padding:10px 14px; font-size:12px; color:#93c5fd; margin-bottom:12px; }

  .no-results { text-align:center; color:var(--text2); padding:40px 20px; font-size:13px; }

  /* icons */
  .icon { font-size:14px; }

  @media (max-width:700px) {
    #sidebar { width:220px; min-width:220px; }
    .action-grid { grid-template-columns:1fr; }
  }
</style>
</head>

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentFile = null;
let activeFilter = 'all';
let currentPath = '';

// ─── RENDER SIDEBAR ──────────────────────────────────────────────────────────

function getFilteredFiles() {
  const q = document.getElementById('search-input').value.toLowerCase();
  return FILES.filter(f => {
    const matchFilter = activeFilter === 'all' || f.group === activeFilter;
    const matchSearch = !q || f.label.toLowerCase().includes(q) || f.desc.toLowerCase().includes(q) || f.section.toLowerCase().includes(q);
    return matchFilter && matchSearch;
  });
}

function buildSidebar() {
  const files = getFilteredFiles();
  const tree = document.getElementById('file-tree');

  if (!files.length) {
    tree.innerHTML = '<div class="no-results">Sin resultados</div>';
    return;
  }

  // Group by section
  const groups = {};
  files.forEach(f => {
    const g = f.group;
    if (!groups[g]) groups[g] = {};
    if (!groups[g][f.section]) groups[g][f.section] = [];
    groups[g][f.section].push(f);
  });

  const groupLabels = { backend: '🔧 Backend', frontend: '🖥️ Frontend', config: '⚙️ Config / Infra' };
  let html = '';

  Object.entries(groups).forEach(([gKey, sections]) => {
    const gId = 'g-' + gKey;
    html += `<div class="tree-group">
      <div class="tree-group-header open" onclick="toggleGroup('${gId}')">
        <span class="chevron">▶</span>${groupLabels[gKey] || gKey}
      </div>
      <div class="tree-group-body open" id="${gId}">`;

    Object.entries(sections).forEach(([sec, items]) => {
      html += `<div class="tree-section">
        <div class="tree-section-label">${sec}</div>`;
      items.forEach(f => {
        const badgeHtml = f.badges.map(b => `<span class="badge badge-${b}">${b}</span>`).join('');
        html += `<div class="file-item ${currentFile?.id === f.id ? 'active' : ''}" onclick="showFile('${f.id}')" id="item-${f.id}">
          <span>${f.icon}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${f.label}</span>
          ${badgeHtml}
        </div>`;
      });
      html += '</div>';
    });
    html += '</div></div>';
  });

  tree.innerHTML = html;
}

function toggleGroup(id) {
  const body = document.getElementById(id);
  const header = body.previousElementSibling;
  body.classList.toggle('open');
  header.classList.toggle('open');
}

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildSidebar();
}

function filterFiles() { buildSidebar(); }

// ─── SHOW FILE ────────────────────────────────────────────────────────────────

function showFile(id) {
  const f = FILES.find(x => x.id === id);
  if (!f) return;
  currentFile = f;
  currentPath = f.path;

  // Update sidebar active
  document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById('item-' + id);
  if (el) el.classList.add('active');

  // Breadcrumb
  document.getElementById('breadcrumb').innerHTML = `🏠 <span>${f.section}</span> › <span>${f.label}</span>`;
  document.getElementById('copy-path-btn').style.display = 'flex';

  // Content
  document.getElementById('welcome').style.display = 'none';
  const detail = document.getElementById('file-detail');
  detail.style.display = 'block';

  const badgeHtml = f.badges.map(b => `<span class="badge badge-${b}" style="font-size:11px;padding:2px 8px;border-radius:10px">${b.toUpperCase()}</span>`).join(' ');

  let html = `<div class="file-header">
    <h2>${f.icon} ${f.label} ${badgeHtml}</h2>
    <div class="file-path">${f.path}</div>
    <div class="desc">${f.desc}</div>
    <div class="meta-row">
      <span class="meta-item">📁 <strong>Tipo:</strong> ${f.type}</span>
      <span class="meta-item">🎯 <strong>Rol:</strong> ${f.role}</span>
    </div>
  </div>`;

  // Functions/Exports
  if (f.functions && f.functions.length) {
    html += `<div class="section-card">
      <h3>🔧 Funciones / Clases Principales</h3>
      <div class="section-card-body">
        <ul class="func-list">`;
    f.functions.forEach(fn => {
      html += `<li class="func-item">
        <span class="func-name">${fn.name}</span>
        <span class="func-desc">${fn.desc}</span>
      </li>`;
    });
    html += '</ul></div></div>';
  }

  // Endpoints
  if (f.endpoints && f.endpoints.length) {
    html += `<div class="section-card">
      <h3>🌐 Endpoints API</h3>
      <div class="section-card-body">`;
    f.endpoints.forEach(ep => {
      html += `<div class="endpoint-item">
        <span class="method ${ep.method}">${ep.method}</span>
        <span class="endpoint-path">${ep.path}</span>
        <span class="endpoint-desc">${ep.desc}</span>
      </div>`;
    });
    html += '</div></div>';
  }

  // Related files
  if (f.relatedFiles && f.relatedFiles.length) {
    html += `<div class="section-card">
      <h3>🔗 Archivos Relacionados</h3>
      <div class="section-card-body" style="display:flex;flex-wrap:wrap;gap:6px">`;
    f.relatedFiles.forEach(r => {
      const rel = FILES.find(x => x.path.endsWith(r.replace(/\//g,'\\')) || x.label === r.split('/').pop());
      if (rel) {
        html += `<span class="dep-tag" style="cursor:pointer;color:var(--orange)" onclick="showFile('${rel.id}')">${rel.icon} ${r}</span>`;
      } else {
        html += `<span class="dep-tag">${r}</span>`;
      }
    });
    html += '</div></div>';
  }

  // Actions / Modificaciones
  if (f.actions && f.actions.length) {
    html += `<div class="section-card">
      <h3>⚡ Guía de Modificaciones y Bugs Comunes</h3>
      <div class="section-card-body">
        <div class="action-grid">`;
    f.actions.forEach(a => {
      html += `<div class="action-card">
        <h4>${a.title}</h4>
        <p>${a.body.replace(/\n/g,'<br>').replace(/`([^`]+)`/g,'<code>$1</code>')}</p>
      </div>`;
    });
    html += '</div></div></div>';
  }

  detail.innerHTML = html;
  detail.scrollTop = 0;
}

// ─── COPY PATH ────────────────────────────────────────────────────────────────
function copyPath() {
  if (!currentPath) return;
  navigator.clipboard.writeText(currentPath).then(() => {
    const btn = document.getElementById('copy-path-btn');
    const orig = btn.textContent;
    btn.textContent = '✅ Copiado';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}
