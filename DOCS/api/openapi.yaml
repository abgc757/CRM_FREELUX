openapi: 3.0.3
info:
  title: FerreCRM API
  description: CRM para ferretería - Ventas, Compras, Almacén y Price Management
  version: 1.0.0
servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.ferrecrm.com
    description: Production
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    PriceParams:
      type: object
      properties:
        precio_acero_mxn_per_kg:
          type: number
          description: Costo del acero por kg en MXN
        factor_logistico:
          type: number
          description: Factor de logística (ej. 1.15)
        impuestos_pct:
          type: number
          description: Porcentaje de impuestos (ej. 0.16)
      required:
        - precio_acero_mxn_per_kg
    FilterCriteria:
      type: object
      properties:
        department_id:
          type: integer
          description: Filtrar por departamento
        category_id:
          type: integer
          description: Filtrar por categoría
        sku_prefix:
          type: string
          description: Filtrar por prefijo de SKU
        sku_list:
          type: array
          items:
            type: string
          description: Lista específica de SKUs
        peso_min:
          type: number
          description: Peso mínimo en kg
        peso_max:
          type: number
          description: Peso máximo en kg
    PreviewItem:
      type: object
      properties:
        sku:
          type: string
        nombre:
          type: string
        current_price:
          type: number
        new_price:
          type: number
        current_margin:
          type: number
        new_margin:
          type: number
        costo_mxn:
          type: number
        peso_kg:
          type: number
    PreviewResponse:
      type: object
      properties:
        total_items:
          type: integer
        preview:
          type: array
          items:
            $ref: '#/components/schemas/PreviewItem'
        params_used:
          $ref: '#/components/schemas/PriceParams'
        filter_used:
          $ref: '#/components/schemas/FilterCriteria'
    ApplyResponse:
      type: object
      properties:
        job_id:
          type: integer
        status:
          type: string
        message:
          type: string
    JobOut:
      type: object
      properties:
        id:
          type: integer
        status:
          type: string
          enum: [pending, running, completed, failed, rolled_back]
        filter_criteria:
          $ref: '#/components/schemas/FilterCriteria'
        params:
          $ref: '#/components/schemas/PriceParams'
        margin_override:
          type: number
        total_count:
          type: integer
        success_count:
          type: integer
        error_count:
          type: integer
        errors:
          type: array
          items:
            type: string
        rollback_job_id:
          type: integer
        created_by:
          type: integer
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
        job_type:
          type: string
          enum: [price_update, rollback]
    PriceHistoryOut:
      type: object
      properties:
        id:
          type: integer
        product_id:
          type: integer
        old_price:
          type: number
        new_price:
          type: number
        old_margin:
          type: number
        new_margin:
          type: number
        reason:
          type: string
        changed_by:
          type: integer
        changed_by_name:
          type: string
        created_at:
          type: string
          format: date-time
        job_id:
          type: integer
    MarginUpdateRequest:
      type: object
      properties:
        margin:
          type: number
          description: Nuevo margen (decimal, ej. 0.25)
        reason:
          type: string
      required:
        - margin
    BulkMarginUpdateRequest:
      type: object
      properties:
        filter:
          $ref: '#/components/schemas/FilterCriteria'
        margin:
          type: number
        reason:
          type: string
      required:
        - filter
        - margin
    MLSuggestionRequest:
      type: object
      properties:
        sku:
          type: string
        costo_mxn:
          type: number
        peso_kg:
          type: number
        department_id:
          type: integer
        historical_price:
          type: number
    MLSuggestionResponse:
      type: object
      properties:
        sku:
          type: string
        suggested_price:
          type: number
        suggested_margin:
          type: number
        confidence:
          type: number
        model_version:
          type: string
    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
security:
  - bearerAuth: []
paths:
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required: [email, password]
      responses:
        '200':
          description: Token JWT
        '401':
          description: Credenciales inválidas
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Registrar usuario
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                nombre:
                  type: string
                role:
                  type: string
              required: [email, password, nombre, role]
      responses:
        '201':
          description: Usuario creado
  /api/v1/products:
    get:
      tags: [Products]
      summary: Listar productos
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: department_id
          schema:
            type: integer
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        '200':
          description: Lista de productos
  /api/v1/products/{sku}:
    get:
      tags: [Products]
      summary: Obtener producto por SKU
      parameters:
        - in: path
          name: sku
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Producto
        '404':
          description: No encontrado
  /api/v1/products/{sku}/stock:
    get:
      tags: [Products]
      summary: Consultar stock
      parameters:
        - in: path
          name: sku
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stock
  /api/v1/clients:
    get:
      tags: [Clients]
      summary: Listar clientes
      responses:
        '200':
          description: Lista de clientes
    post:
      tags: [Clients]
      summary: Crear cliente
      responses:
        '201':
          description: Cliente creado
  /api/v1/quotes:
    post:
      tags: [Quotes]
      summary: Crear cotización
      responses:
        '201':
          description: Cotización creada
  /api/v1/quotes/{id}/convert:
    post:
      tags: [Quotes]
      summary: Convertir cotización a venta
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Venta creada
  /api/v1/quotes/{id}/approve-price:
    post:
      tags: [Quotes]
      summary: Aprobar precio (gerencia)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Precio aprobado
  /api/v1/purchases:
    post:
      tags: [Purchases]
      summary: Crear orden de compra
      responses:
        '201':
          description: Orden creada
  /api/v1/purchases/{id}/receive:
    post:
      tags: [Purchases]
      summary: Recibir compra (+ stock)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Compra recibida
  /api/v1/purchases/availability:
    post:
      tags: [Purchases]
      summary: Solicitar disponibilidad
      responses:
        '200':
          description: Disponibilidad
  /api/v1/inventory/movement:
    post:
      tags: [Inventory]
      summary: Registrar entrada/salida
      responses:
        '200':
          description: Movimiento registrado
  /api/v1/inventory/movements:
    get:
      tags: [Inventory]
      summary: Historial de movimientos
      responses:
        '200':
          description: Lista de movimientos
  /api/v1/suppliers/search:
    get:
      tags: [Suppliers]
      summary: Búsqueda inteligente proveedores
      responses:
        '200':
          description: Proveedores
  # ──────────────────────────────
  # PRICE MANAGEMENT
  # ──────────────────────────────
  /api/v1/price-management/preview:
    post:
      tags: [Price Management]
      summary: Simular actualización masiva de precios
      description: Calcula nuevos precios sin persistir cambios. Retorna preview por producto.
      operationId: previewPriceUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: '#/components/schemas/FilterCriteria'
                params:
                  $ref: '#/components/schemas/PriceParams'
                margin_override:
                  type: number
                  description: Sobrescribe el margen de todos los productos afectados
      responses:
        '200':
          description: Preview de actualización
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewResponse'
        '422':
          description: Error de validación
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/price-management/apply:
    post:
      tags: [Price Management]
      summary: Aplicar actualización masiva de precios
      description: Encola un job asíncrono para actualizar precios. Retorna job_id inmediatamente.
      operationId: applyPriceUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                filter:
                  $ref: '#/components/schemas/FilterCriteria'
                params:
                  $ref: '#/components/schemas/PriceParams'
                margin_override:
                  type: number
                reason:
                  type: string
                  default: Actualización masiva de precios
                batch_size:
                  type: integer
                  default: 100
      responses:
        '202':
          description: Job encolado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyResponse'
        '422':
          description: Error de validación
  /api/v1/price-management/rollback:
    post:
      tags: [Price Management]
      summary: Revertir una actualización de precios
      description: Crea un job de rollback que restaura los precios previos.
      operationId: rollbackPriceUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                job_id:
                  type: integer
                  description: ID del job a revertir
                reason:
                  type: string
                  default: Rollback solicitado
              required:
                - job_id
      responses:
        '202':
          description: Rollback encolado
        '404':
          description: Job no encontrado
  /api/v1/price-management/jobs/{job_id}:
    get:
      tags: [Price Management]
      summary: Estado de un job
      parameters:
        - in: path
          name: job_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Estado del job
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobOut'
        '404':
          description: Job no encontrado
  /api/v1/price-management/jobs:
    get:
      tags: [Price Management]
      summary: Listar jobs
      parameters:
        - in: query
          name: skip
          schema:
            type: integer
            default: 0
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, running, completed, failed, rolled_back]
      responses:
        '200':
          description: Lista de jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JobOut'
  /api/v1/price-management/products/{sku}/margin:
    patch:
      tags: [Price Management]
      summary: Modificar margen de un producto
      parameters:
        - in: path
          name: sku
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MarginUpdateRequest'
      responses:
        '200':
          description: Margen actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreviewItem'
        '404':
          description: Producto no encontrado
  /api/v1/price-management/products/bulk-margin:
    patch:
      tags: [Price Management]
      summary: Modificar margen masivo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkMarginUpdateRequest'
      responses:
        '202':
          description: Job de margen masivo encolado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplyResponse'
  /api/v1/price-management/products/{sku}/price-history:
    get:
      tags: [Price Management]
      summary: Historial de precios de un producto
      parameters:
        - in: path
          name: sku
          required: true
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: Historial de precios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PriceHistoryOut'
        '404':
          description: Producto no encontrado
  # ──────────────────────────────
  # ML
  # ──────────────────────────────
  /api/v1/ml/price-suggestion:
    post:
      tags: [ML]
      summary: Obtener sugerencia de precio (stub)
      description: Endpoint preparado para integración con modelos ML. Actualmente retorna sugerencia basada en reglas simples.
      operationId: getPriceSuggestion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MLSuggestionRequest'
      responses:
        '200':
          description: Sugerencia de precio
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MLSuggestionResponse'
  /api/v1/ml/export/dataset:
    get:
      tags: [ML]
      summary: Exportar dataset para entrenamiento ML
      description: Exporta datos agregados para modelos de ML (price_history, sales, stock, suppliers).
      operationId: exportDataset
      parameters:
        - in: query
          name: model_type
          schema:
            type: string
            enum: [price_suggestion, demand_forecast, supplier_ranking, price_history]
            default: price_history
        - in: query
          name: format
          schema:
            type: string
            enum: [json, csv]
            default: json
        - in: query
          name: start_date
          schema:
            type: string
            format: date
        - in: query
          name: end_date
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Dataset exportado
          content:
            application/json:
              schema:
                type: object
