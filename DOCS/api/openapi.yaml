openapi: 3.1.0
info:
  title: CRM FreeLux API
  description: |
    API REST para el sistema CRM de Aceros y Perfiles FreeLux.

    ## Autenticación
    La API usa JWT Bearer tokens. Obtén un token en `POST /api/v1/auth/login`
    y envíalo en el header `Authorization: Bearer <token>`.

    ## Roles
    | Rol | Descripción |
    |-----|-------------|
    | `ADMIN` | Acceso total al sistema |
    | `GERENTE` | Aprobación de precios, reportes, gestión de usuarios |
    | `VENDEDOR` | Crear cotizaciones, ver clientes y productos |
    | `COMPRAS` | Gestión de proveedores, órdenes de compra |
    | `ALMACEN` | Control de inventario, entradas/salidas |

  version: 1.0.0
  contact:
    name: FreeLux CRM
    email: dev@freelux.mx
  license:
    name: MIT

servers:
  - url: http://localhost:8000
    description: Desarrollo local
  - url: https://crm.freelux.mx
    description: Staging / Producción

tags:
  - name: Auth
    description: Autenticación y gestión de tokens JWT
  - name: Users
    description: CRUD de usuarios y gestión de roles
  - name: Clients
    description: Gestión de clientes
  - name: Products
    description: Catálogo de productos con búsqueda full-text
  - name: Suppliers
    description: Proveedores y condiciones comerciales
  - name: Quotes
    description: Cotizaciones — crear, enviar, aprobar, convertir a venta
  - name: Sales
    description: Ventas, remisiones y notas de venta
  - name: Purchases
    description: Órdenes de compra y solicitudes de disponibilidad
  - name: Inventory
    description: Control de inventario, kardex y alertas de stock
  - name: ML
    description: Hooks de Machine Learning (price suggestion, demand forecast)
  - name: Health
    description: Estado del sistema

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "Token JWT obtenido de POST /api/v1/auth/login"

  schemas:
    # ── Enums ──────────────────────────────────────────────────
    UserRole:
      type: string
      enum: [ADMIN, GERENTE, VENDEDOR, COMPRAS, ALMACEN]
      example: VENDEDOR

    QuoteStatus:
      type: string
      enum: [BORRADOR, ENVIADA, ACEPTADA, RECHAZADA, VENCIDA]
      example: ENVIADA

    SaleStatus:
      type: string
      enum: [CONFIRMADA, EN_PREPARACION, LISTA, ENTREGADA, CANCELADA]
      example: CONFIRMADA

    MovementType:
      type: string
      enum: [COMPRA, VENTA, AJUSTE, DEVOLUCION, AJUSTE_POSITIVO, AJUSTE_NEGATIVO]

    # ── Comunes ────────────────────────────────────────────────
    PaginationMeta:
      type: object
      properties:
        total: { type: integer, example: 156 }
        page: { type: integer, example: 1 }
        per_page: { type: integer, example: 20 }
        pages: { type: integer, example: 8 }

    ErrorResponse:
      type: object
      properties:
        detail:
          type: string
          example: "Recurso no encontrado"
        code:
          type: string
          example: "NOT_FOUND"

    ValidationError:
      type: object
      properties:
        detail:
          type: array
          items:
            type: object
            properties:
              loc: { type: array, items: { type: string } }
              msg: { type: string }
              type: { type: string }

    # ── Auth ───────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: "admin@freelux.mx"
        password:
          type: string
          minLength: 8
          example: "Admin1234!"

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        refresh_token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
        token_type:
          type: string
          example: "bearer"
        expires_in:
          type: integer
          description: "Segundos hasta expiración del access_token"
          example: 1800

    # ── Users ──────────────────────────────────────────────────
    UserCreate:
      type: object
      required: [email, password, full_name, role]
      properties:
        email:
          type: string
          format: email
          example: "juan.garcia@freelux.mx"
        password:
          type: string
          minLength: 8
          example: "Vendedor1234!"
        full_name:
          type: string
          example: "Juan García López"
        role:
          $ref: '#/components/schemas/UserRole'
        phone:
          type: string
          example: "+52 55 1234 5678"

    UserResponse:
      type: object
      properties:
        id: { type: integer, example: 3 }
        email: { type: string, example: "juan.garcia@freelux.mx" }
        full_name: { type: string, example: "Juan García López" }
        role: { $ref: '#/components/schemas/UserRole' }
        is_active: { type: boolean, example: true }
        created_at: { type: string, format: date-time }

    # ── Clients ────────────────────────────────────────────────
    ClientCreate:
      type: object
      required: [company_name, rfc]
      properties:
        company_name:
          type: string
          example: "IIMSA Infraestructura Industrial SA de CV"
        rfc:
          type: string
          pattern: '^[A-ZÑ&]{3,4}[0-9]{6}[A-Z0-9]{3}$'
          example: "III880415AB7"
        contact_name:
          type: string
          example: "Ing. Roberto Flores"
        phone:
          type: string
          example: "+52 55 1234 5678"
        email:
          type: string
          format: email
          example: "compras@iimsa.com.mx"
        address:
          type: string
          example: "Blvd. Manuel Ávila Camacho 32, Polanco, CDMX"
        credit_limit:
          type: number
          format: float
          example: 500000.00

    ClientResponse:
      allOf:
        - $ref: '#/components/schemas/ClientCreate'
        - type: object
          properties:
            id: { type: integer, example: 42 }
            created_at: { type: string, format: date-time }
            total_purchased_ytd: { type: number, example: 284500.00 }
            last_purchase_date: { type: string, format: date }
            quotes_count: { type: integer, example: 12 }

    # ── Products ───────────────────────────────────────────────
    ProductCreate:
      type: object
      required: [sku, name, unit, cost_price, list_price]
      properties:
        sku:
          type: string
          example: "PTR-4X4-14-6M"
        name:
          type: string
          example: "PTR 4\"x4\"x6m Calibre 14"
        description:
          type: string
          example: "Tubo estructural rectangular 4x4 pulgadas, espesor calibre 14 (1.9mm), longitud 6 metros, acero A36"
        category:
          type: string
          enum: [PERFIL, LAMINA, TUBERIA, PTR, HERRAJE, MALLA, VARILLA, OTRO]
          example: PTR
        unit:
          type: string
          example: "PZA"
        cost_price:
          type: number
          format: float
          example: 820.00
        list_price:
          type: number
          format: float
          example: 980.00
        stock_min:
          type: integer
          example: 20
        stock_max:
          type: integer
          example: 200
        weight_kg:
          type: number
          example: 38.5
        fulfillment_type:
          type: string
          enum: [STOCK, MTO]
          example: STOCK
          description: "STOCK = disponible en almacén, MTO = Make To Order (se pide al recibir venta)"

    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/ProductCreate'
        - type: object
          properties:
            id: { type: integer, example: 15 }
            current_stock: { type: integer, example: 45 }
            stock_status:
              type: string
              enum: [OK, LOW, OUT]
              example: LOW
            created_at: { type: string, format: date-time }

    # ── Suppliers ──────────────────────────────────────────────
    SupplierCreate:
      type: object
      required: [company_name, rfc]
      properties:
        company_name:
          type: string
          example: "Aceros del Norte SA de CV"
        rfc:
          type: string
          example: "AND850312KJ4"
        contact_name:
          type: string
          example: "Ing. Carlos Mendoza"
        phone:
          type: string
          example: "+52 81 8765 4321"
        email:
          type: string
          example: "ventas@acerosdelnorte.com.mx"
        city:
          type: string
          example: "Monterrey, NL"
        payment_terms:
          type: string
          example: "30 días neto"
        lead_time_days:
          type: integer
          example: 3

    SupplierResponse:
      allOf:
        - $ref: '#/components/schemas/SupplierCreate'
        - type: object
          properties:
            id: { type: integer, example: 7 }
            rating: { type: number, example: 4.8 }
            on_time_delivery_rate: { type: number, example: 0.97 }
            total_orders: { type: integer, example: 24 }

    # ── Quotes ─────────────────────────────────────────────────
    QuoteItemCreate:
      type: object
      required: [product_id, quantity, unit_price]
      properties:
        product_id: { type: integer, example: 15 }
        quantity: { type: number, example: 50 }
        unit_price: { type: number, example: 900.00 }
        discount_pct: { type: number, example: 5.0, description: "Porcentaje de descuento 0–100" }
        notes: { type: string, example: "Precio especial por volumen" }

    QuoteCreate:
      type: object
      required: [client_id, items]
      properties:
        client_id: { type: integer, example: 42 }
        items:
          type: array
          items: { $ref: '#/components/schemas/QuoteItemCreate' }
          minItems: 1
        notes:
          type: string
          example: "Entrega en obra del cliente. Incluye flete zona metropolitana."
        validity_days:
          type: integer
          default: 15
          example: 15
        currency:
          type: string
          default: MXN
          example: MXN

    QuoteResponse:
      type: object
      properties:
        id: { type: integer, example: 142 }
        folio: { type: string, example: "COT-2024-0142" }
        client: { $ref: '#/components/schemas/ClientResponse' }
        items:
          type: array
          items:
            type: object
            properties:
              id: { type: integer }
              product: { $ref: '#/components/schemas/ProductResponse' }
              quantity: { type: number }
              unit_price: { type: number }
              discount_pct: { type: number }
              subtotal: { type: number }
        subtotal: { type: number, example: 117500.00 }
        tax_amount: { type: number, example: 18800.00 }
        total: { type: number, example: 136300.00 }
        currency: { type: string, example: "MXN" }
        status: { $ref: '#/components/schemas/QuoteStatus' }
        requires_approval: { type: boolean, example: false }
        notes: { type: string }
        valid_until: { type: string, format: date }
        sent_at: { type: string, format: date-time, nullable: true }
        created_by: { $ref: '#/components/schemas/UserResponse' }
        created_at: { type: string, format: date-time }
        version: { type: integer, example: 1 }

    # ── Sales ──────────────────────────────────────────────────
    SaleResponse:
      type: object
      properties:
        id: { type: integer, example: 89 }
        folio: { type: string, example: "VTA-2024-0089" }
        remission_folio: { type: string, example: "REM-2024-0089" }
        quote_id: { type: integer, example: 139 }
        client: { $ref: '#/components/schemas/ClientResponse' }
        status: { $ref: '#/components/schemas/SaleStatus' }
        total: { type: number, example: 136300.00 }
        billing_requested: { type: boolean, example: false }
        delivered_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    # ── Inventory ──────────────────────────────────────────────
    InventoryEntryCreate:
      type: object
      required: [product_id, quantity, movement_type]
      properties:
        product_id: { type: integer, example: 15 }
        quantity: { type: number, example: 50 }
        movement_type:
          type: string
          enum: [COMPRA, AJUSTE_POSITIVO, DEVOLUCION]
        unit_cost: { type: number, example: 820.00 }
        reference: { type: string, example: "OC-2024-0021" }
        notes: { type: string, example: "Recepción parcial Aceros del Norte" }

    KardexItem:
      type: object
      properties:
        date: { type: string, format: date-time }
        movement_type: { $ref: '#/components/schemas/MovementType' }
        reference: { type: string, example: "OC-2024-0021" }
        entry_qty: { type: number, nullable: true }
        exit_qty: { type: number, nullable: true }
        balance: { type: number, example: 45 }
        unit_cost: { type: number, example: 820.00 }
        user: { type: string, example: "María Almacén" }

security:
  - BearerAuth: []

paths:
  # ── Health ─────────────────────────────────────────────────
  /health:
    get:
      tags: [Health]
      summary: Estado del sistema
      security: []
      responses:
        '200':
          description: Sistema operativo
          content:
            application/json:
              example:
                status: ok
                version: "1.0.0"
                db: connected
                redis: connected
                elasticsearch: connected

  # ── Auth ───────────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Iniciar sesión
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
            example:
              email: admin@freelux.mx
              password: Admin1234!
      responses:
        '200':
          description: Login exitoso
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          description: Credenciales inválidas
          content:
            application/json:
              example: { detail: "Credenciales inválidas" }
        '422':
          description: Error de validación

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      security: []
      requestBody:
        content:
          application/json:
            example:
              refresh_token: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
      responses:
        '200':
          description: Token renovado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '401':
          description: Refresh token inválido o expirado

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Cerrar sesión (invalida refresh token)
      responses:
        '200':
          description: Sesión cerrada
          content:
            application/json:
              example: { message: "Sesión cerrada correctamente" }

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Obtener usuario actual
      responses:
        '200':
          description: Datos del usuario autenticado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }

  # ── Users ──────────────────────────────────────────────────
  /api/v1/users:
    get:
      tags: [Users]
      summary: Listar usuarios
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
        - name: role
          in: query
          schema: { $ref: '#/components/schemas/UserRole' }
        - name: is_active
          in: query
          schema: { type: boolean }
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/UserResponse' }
                  meta: { $ref: '#/components/schemas/PaginationMeta' }
    post:
      tags: [Users]
      summary: Crear usuario (solo ADMIN/GERENTE)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserCreate' }
      responses:
        '201':
          description: Usuario creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '409':
          description: Email ya registrado

  /api/v1/users/{user_id}:
    get:
      tags: [Users]
      summary: Obtener usuario por ID
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '404':
          description: Usuario no encontrado
    put:
      tags: [Users]
      summary: Actualizar usuario
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name: { type: string }
                phone: { type: string }
                is_active: { type: boolean }
      responses:
        '200':
          description: Usuario actualizado

  /api/v1/users/{user_id}/role:
    patch:
      tags: [Users]
      summary: Cambiar rol de usuario (solo ADMIN)
      parameters:
        - name: user_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            example: { role: "GERENTE" }
      responses:
        '200':
          description: Rol actualizado

  # ── Clients ────────────────────────────────────────────────
  /api/v1/clients:
    get:
      tags: [Clients]
      summary: Listar clientes
      parameters:
        - name: q
          in: query
          description: Búsqueda por nombre, RFC o email
          schema: { type: string, example: "IIMSA" }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Lista de clientes
          content:
            application/json:
              example:
                items:
                  - id: 42
                    company_name: "IIMSA Infraestructura Industrial SA de CV"
                    rfc: "III880415AB7"
                    contact_name: "Ing. Roberto Flores"
                    phone: "+52 55 1234 5678"
                    credit_limit: 500000.00
                    total_purchased_ytd: 284500.00
                meta:
                  total: 47
                  page: 1
                  per_page: 20
    post:
      tags: [Clients]
      summary: Crear cliente
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientCreate' }
      responses:
        '201':
          description: Cliente creado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientResponse' }

  /api/v1/clients/{client_id}:
    get:
      tags: [Clients]
      summary: Obtener cliente
      parameters:
        - name: client_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Cliente encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ClientResponse' }
    put:
      tags: [Clients]
      summary: Actualizar cliente
      parameters:
        - name: client_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClientCreate' }
      responses:
        '200':
          description: Cliente actualizado

  /api/v1/clients/{client_id}/sales:
    get:
      tags: [Clients]
      summary: Historial de ventas del cliente
      parameters:
        - name: client_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Historial de ventas
          content:
            application/json:
              example:
                total_ytd: 284500.00
                avg_ticket: 47416.67
                sales_count: 6
                sales: []

  # ── Products ───────────────────────────────────────────────
  /api/v1/products:
    get:
      tags: [Products]
      summary: Listar productos
      parameters:
        - name: category
          in: query
          schema: { type: string, example: "PTR" }
        - name: stock_status
          in: query
          schema: { type: string, enum: [OK, LOW, OUT] }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 50 }
      responses:
        '200':
          description: Lista de productos
          content:
            application/json:
              example:
                items:
                  - id: 15
                    sku: "PTR-4X4-14-6M"
                    name: "PTR 4\"x4\"x6m Calibre 14"
                    category: "PTR"
                    unit: "PZA"
                    cost_price: 820.00
                    list_price: 980.00
                    current_stock: 12
                    stock_min: 20
                    stock_status: "LOW"
    post:
      tags: [Products]
      summary: Crear producto
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductCreate' }
      responses:
        '201':
          description: Producto creado

  /api/v1/products/search:
    get:
      tags: [Products]
      summary: Búsqueda full-text de productos (Elasticsearch)
      parameters:
        - name: q
          in: query
          required: true
          description: "Texto a buscar: SKU, descripción, categoría"
          schema: { type: string, example: "PTR 4x4" }
        - name: limit
          in: query
          schema: { type: integer, default: 10, maximum: 50 }
      responses:
        '200':
          description: Resultados de búsqueda
          content:
            application/json:
              example:
                results:
                  - id: 15
                    sku: "PTR-4X4-14-6M"
                    name: "PTR 4\"x4\"x6m Calibre 14"
                    list_price: 980.00
                    current_stock: 12
                    score: 0.95
                  - id: 16
                    sku: "PTR-4X4-16-6M"
                    name: "PTR 4\"x4\"x6m Calibre 16"
                    list_price: 890.00
                    current_stock: 60
                    score: 0.88
                took_ms: 12

  /api/v1/products/import:
    post:
      tags: [Products]
      summary: Importar productos desde CSV
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: "Archivo CSV con columnas: SKU,DESCRIPCION,UNIDAD,PRECIO_COSTO,PRECIO_LISTA,STOCK_MIN,CATEGORIA"
      responses:
        '202':
          description: Importación iniciada
          content:
            application/json:
              example:
                task_id: "d290f1ee-6c54-4b01-90e6-d701748f0851"
                message: "Importación iniciada. Consulta /api/v1/tasks/{task_id} para el progreso."

  /api/v1/products/{product_id}:
    get:
      tags: [Products]
      summary: Obtener producto
      parameters:
        - name: product_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ProductResponse' }
    put:
      tags: [Products]
      summary: Actualizar producto
      parameters:
        - name: product_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductCreate' }
      responses:
        '200':
          description: Producto actualizado

  # ── Suppliers ──────────────────────────────────────────────
  /api/v1/suppliers:
    get:
      tags: [Suppliers]
      summary: Listar proveedores
      responses:
        '200':
          description: Lista de proveedores
    post:
      tags: [Suppliers]
      summary: Crear proveedor
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SupplierCreate' }
      responses:
        '201':
          description: Proveedor creado

  /api/v1/suppliers/{supplier_id}:
    get:
      tags: [Suppliers]
      summary: Obtener proveedor
      parameters:
        - name: supplier_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Proveedor encontrado
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SupplierResponse' }
    put:
      tags: [Suppliers]
      summary: Actualizar proveedor
      parameters:
        - name: supplier_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SupplierCreate' }
      responses:
        '200':
          description: Proveedor actualizado

  # ── Quotes ─────────────────────────────────────────────────
  /api/v1/quotes:
    get:
      tags: [Quotes]
      summary: Listar cotizaciones
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/QuoteStatus' }
        - name: client_id
          in: query
          schema: { type: integer }
        - name: created_by
          in: query
          schema: { type: integer }
        - name: from_date
          in: query
          schema: { type: string, format: date, example: "2024-11-01" }
        - name: to_date
          in: query
          schema: { type: string, format: date, example: "2024-11-30" }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: per_page
          in: query
          schema: { type: integer, default: 20 }
      responses:
        '200':
          description: Lista de cotizaciones
    post:
      tags: [Quotes]
      summary: Crear cotización
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuoteCreate' }
            example:
              client_id: 42
              items:
                - product_id: 15
                  quantity: 50
                  unit_price: 900.00
                  notes: "Precio especial por volumen"
                - product_id: 22
                  quantity: 20
                  unit_price: 1250.00
              notes: "Entrega en obra del cliente. Incluye flete ZMCM."
              validity_days: 15
      responses:
        '201':
          description: Cotización creada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuoteResponse' }

  /api/v1/quotes/pending-approval:
    get:
      tags: [Quotes]
      summary: Cotizaciones pendientes de aprobación de precio (solo GERENTE)
      responses:
        '200':
          description: Lista de cotizaciones que requieren aprobación
          content:
            application/json:
              example:
                items:
                  - id: 142
                    folio: "COT-2024-0142"
                    client_name: "IIMSA Infraestructura"
                    total: 136300.00
                    created_by: "Juan García"
                    created_at: "2024-11-13T10:30:00Z"
                    items_below_min: 1

  /api/v1/quotes/{quote_id}:
    get:
      tags: [Quotes]
      summary: Obtener cotización
      parameters:
        - name: quote_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Cotización encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuoteResponse' }
    put:
      tags: [Quotes]
      summary: Actualizar cotización (crea nueva versión si ya fue enviada)
      parameters:
        - name: quote_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema: { $ref: '#/components/schemas/QuoteCreate' }
      responses:
        '200':
          description: Cotización actualizada

  /api/v1/quotes/{quote_id}/pdf:
    get:
      tags: [Quotes]
      summary: Generar y descargar PDF de cotización
      parameters:
        - name: quote_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: PDF de la cotización
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  /api/v1/quotes/{quote_id}/send-whatsapp:
    post:
      tags: [Quotes]
      summary: Enviar cotización por WhatsApp
      parameters:
        - name: quote_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            example:
              phone: "+52 55 9876 5432"
              message: "Hola Ing. Flores, adjunto su cotización COT-2024-0142 por $136,300. Válida 15 días."
      responses:
        '202':
          description: Envío programado
          content:
            application/json:
              example: { task_id: "abc123", message: "Mensaje en cola de envío" }

  /api/v1/quotes/{quote_id}/approve:
    post:
      tags: [Quotes]
      summary: Aprobar precio de cotización (solo GERENTE)
      parameters:
        - name: quote_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Precio aprobado, cotización lista para enviar

  /api/v1/quotes/{quote_id}/reject-price:
    post:
      tags: [Quotes]
      summary: Rechazar precio de cotización con nota (solo GERENTE)
      parameters:
        - name: quote_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            example:
              note: "Precio mínimo autorizado para PTR 4x4: $870. Favor de ajustar."
      responses:
        '200':
          description: Precio rechazado, cotización devuelta al vendedor

  /api/v1/quotes/{quote_id}/convert-to-sale:
    post:
      tags: [Quotes]
      summary: Convertir cotización aceptada a venta
      parameters:
        - name: quote_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '201':
          description: Venta creada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SaleResponse' }
        '409':
          description: Stock insuficiente
          content:
            application/json:
              example:
                detail: "Stock insuficiente"
                products_short:
                  - product_id: 15
                    sku: "PTR-4X4-14-6M"
                    requested: 50
                    available: 12

  # ── Sales ──────────────────────────────────────────────────
  /api/v1/sales:
    get:
      tags: [Sales]
      summary: Listar ventas
      parameters:
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/SaleStatus' }
        - name: client_id
          in: query
          schema: { type: integer }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
      responses:
        '200':
          description: Lista de ventas

  /api/v1/sales/{sale_id}:
    get:
      tags: [Sales]
      summary: Obtener venta
      parameters:
        - name: sale_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Venta encontrada
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SaleResponse' }

  /api/v1/sales/{sale_id}/status:
    patch:
      tags: [Sales]
      summary: Actualizar estado de venta
      parameters:
        - name: sale_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            example:
              status: "ENTREGADA"
              notes: "Entregado en obra Polanco, firmó Ing. Flores"
      responses:
        '200':
          description: Estado actualizado

  /api/v1/sales/{sale_id}/remission-pdf:
    get:
      tags: [Sales]
      summary: Descargar PDF de remisión
      parameters:
        - name: sale_id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: PDF de remisión
          content:
            application/pdf:
              schema:
                type: string
                format: binary

  # ── Purchases ──────────────────────────────────────────────
  /api/v1/purchases/availability:
    get:
      tags: [Purchases]
      summary: Listar solicitudes de disponibilidad
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [PENDING, ANSWERED, CANCELLED] }
      responses:
        '200':
          description: Lista de solicitudes
    post:
      tags: [Purchases]
      summary: Crear solicitud de disponibilidad
      requestBody:
        content:
          application/json:
            example:
              product_id: 15
              quantity_needed: 100
              needed_by: "2024-12-01"
              quote_id: 142
              notes: "Urgente, cliente espera confirmación"
      responses:
        '201':
          description: Solicitud creada

  /api/v1/purchases/availability/{request_id}/respond:
    post:
      tags: [Purchases]
      summary: Responder solicitud de disponibilidad (solo COMPRAS/GERENTE)
      parameters:
        - name: request_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            example:
              supplier_id: 7
              eta_date: "2024-11-20"
              estimated_price: 820.00
              notes: "Aceros del Norte confirma entrega en 5 días hábiles"
      responses:
        '200':
          description: Respuesta registrada y Quote actualizada

  /api/v1/purchases/orders:
    get:
      tags: [Purchases]
      summary: Listar órdenes de compra
      responses:
        '200':
          description: Lista de órdenes
    post:
      tags: [Purchases]
      summary: Crear orden de compra
      requestBody:
        content:
          application/json:
            example:
              supplier_id: 7
              items:
                - product_id: 15
                  quantity: 100
                  unit_price: 820.00
                - product_id: 22
                  quantity: 30
                  unit_price: 1180.00
              notes: "OC urgente para IIMSA"
              expected_delivery: "2024-11-20"
      responses:
        '201':
          description: OC creada

  /api/v1/purchases/orders/{order_id}/receive:
    post:
      tags: [Purchases]
      summary: Registrar recepción de OC (total o parcial)
      parameters:
        - name: order_id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            example:
              items:
                - product_id: 15
                  received_qty: 80
                  unit_cost: 820.00
                - product_id: 22
                  received_qty: 30
                  unit_cost: 1180.00
              notes: "Recepción parcial, pendiente 20 piezas PTR"
      responses:
        '200':
          description: Recepción registrada, inventario actualizado

  # ── Inventory ──────────────────────────────────────────────
  /api/v1/inventory:
    get:
      tags: [Inventory]
      summary: Estado actual del inventario
      parameters:
        - name: stock_status
          in: query
          schema: { type: string, enum: [OK, LOW, OUT] }
        - name: category
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
      responses:
        '200':
          description: Estado del inventario
          content:
            application/json:
              example:
                items:
                  - product_id: 15
                    sku: "PTR-4X4-14-6M"
                    name: "PTR 4\"x4\"x6m Calibre 14"
                    current_stock: 12
                    stock_min: 20
                    stock_status: "LOW"
                    inventory_value: 9840.00
                summary:
                  total_skus: 312
                  total_value: 4285600.00
                  low_stock: 8
                  out_of_stock: 2

  /api/v1/inventory/entry:
    post:
      tags: [Inventory]
      summary: Registrar entrada al inventario
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InventoryEntryCreate' }
      responses:
        '201':
          description: Entrada registrada
          content:
            application/json:
              example:
                product_id: 15
                previous_stock: 12
                added_qty: 50
                new_stock: 62
                movement_id: 891

  /api/v1/inventory/alerts:
    get:
      tags: [Inventory]
      summary: Productos bajo stock mínimo (tiempo real)
      responses:
        '200':
          description: Lista de alertas de stock
          content:
            application/json:
              example:
                low_stock:
                  - product_id: 15
                    sku: "PTR-4X4-14-6M"
                    name: "PTR 4\"x4\"x6m Calibre 14"
                    current_stock: 12
                    stock_min: 20
                    deficit: 8
                out_of_stock:
                  - product_id: 22
                    sku: "IPR-6-9M"
                    name: "Perfil IPR 6\"×9m"
                    current_stock: 0
                    stock_min: 10

  /api/v1/inventory/{product_id}/kardex:
    get:
      tags: [Inventory]
      summary: Kardex de movimientos de un producto
      parameters:
        - name: product_id
          in: path
          required: true
          schema: { type: integer }
        - name: from_date
          in: query
          schema: { type: string, format: date }
        - name: to_date
          in: query
          schema: { type: string, format: date }
      responses:
        '200':
          description: Kardex del producto
          content:
            application/json:
              schema:
                type: object
                properties:
                  product: { $ref: '#/components/schemas/ProductResponse' }
                  movements:
                    type: array
                    items: { $ref: '#/components/schemas/KardexItem' }
                  opening_balance: { type: integer }
                  closing_balance: { type: integer }

  /api/v1/inventory/valuation:
    get:
      tags: [Inventory]
      summary: Valorización del inventario (costo promedio ponderado)
      responses:
        '200':
          description: Valorización actual
          content:
            application/json:
              example:
                as_of: "2024-11-13"
                total_value_cost: 4285600.00
                total_value_list: 5142720.00
                by_category:
                  - category: "PTR"
                    items: 45
                    value_cost: 1250000.00
                  - category: "PERFIL"
                    items: 38
                    value_cost: 890000.00

  # ── ML Hooks ───────────────────────────────────────────────
  /api/v1/ml/price-suggestion:
    post:
      tags: [ML]
      summary: Sugerencia de precio (hook ML)
      description: "Sugiere precio óptimo basado en historial del cliente y condiciones de mercado. Fallback a fórmula si el modelo no está disponible."
      requestBody:
        content:
          application/json:
            example:
              product_id: 15
              client_id: 42
              quantity: 50
      responses:
        '200':
          description: Precio sugerido
          content:
            application/json:
              example:
                suggested_price: 965.00
                confidence: 0.87
                reason: "Cliente frecuente, volumen alto. Precio mercado $950–980."
                is_ml: true
                fallback_used: false

  /api/v1/ml/demand-forecast:
    post:
      tags: [ML]
      summary: Pronóstico de demanda (hook ML)
      requestBody:
        content:
          application/json:
            example:
              product_id: 15
              horizon_days: 30
      responses:
        '200':
          description: Pronóstico de demanda
          content:
            application/json:
              example:
                product_id: 15
                horizon_days: 30
                avg_daily_demand: 4.5
                suggested_reorder_qty: 135
                suggested_reorder_date: "2024-11-25"
                is_ml: false
                fallback_used: true
