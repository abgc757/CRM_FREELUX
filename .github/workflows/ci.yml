name: CI/CD FreeLux CRM

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: "Deploy to staging after build"
        required: false
        default: "false"
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository_owner }}/crm_freelux/backend
  IMAGE_NAME_FRONTEND: ${{ github.repository_owner }}/crm_freelux/frontend
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────
  # 1. Tests del Backend (pytest + cobertura)
  # ─────────────────────────────────────────────────────────────
  backend-test:
    name: Backend — Tests y Cobertura
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: freelux_test
          POSTGRES_USER: freelux
          POSTGRES_PASSWORD: freelux_test_2024
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: "backend/requirements*.txt"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint con Ruff
        run: |
          pip install ruff
          ruff check app/ --output-format=github

      - name: Verificar tipos con mypy
        run: |
          pip install mypy
          mypy app/ --ignore-missing-imports --no-strict-optional
        continue-on-error: true

      - name: Ejecutar migraciones de prueba
        env:
          DATABASE_URL: postgresql+asyncpg://freelux:freelux_test_2024@localhost:5432/freelux_test
          SECRET_KEY: test-secret-key-for-ci-min-32-chars
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: |
          alembic upgrade head

      - name: Ejecutar tests con pytest
        env:
          DATABASE_URL: postgresql+asyncpg://freelux:freelux_test_2024@localhost:5432/freelux_test
          SECRET_KEY: test-secret-key-for-ci-min-32-chars
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
          TESTING: "true"
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage_html \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short \
            -x

      - name: Subir reporte de cobertura a Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Archivar reporte HTML de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage-html
          path: backend/coverage_html/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # 2. Lint del Frontend (ESLint + TypeScript)
  # ─────────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend — Lint y Tipos
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar ESLint
        run: npx eslint . --ext .ts,.tsx,.js,.jsx --max-warnings 0

      - name: Verificar tipos con TypeScript
        run: npx tsc --noEmit

      - name: Verificar formato con Prettier
        run: npx prettier --check "src/**/*.{ts,tsx,css,json}"
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # 3. Tests del Frontend (Jest / Vitest)
  # ─────────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend — Tests
    runs-on: ubuntu-latest
    needs: frontend-lint

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests
        run: npm test -- --coverage --watchAll=false --ci
        env:
          CI: true
          NEXT_PUBLIC_API_URL: http://localhost:8000

      - name: Subir cobertura frontend a Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────
  # 4. Build y Push de imágenes Docker
  # ─────────────────────────────────────────────────────────────
  docker-build:
    name: Docker — Build y Push
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-lint]
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      backend_image: ${{ steps.meta-backend.outputs.tags }}
      frontend_image: ${{ steps.meta-frontend.outputs.tags }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:master
            network=host

      - name: Login a GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extraer metadata (Backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extraer metadata (Frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build y Push — Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          platforms: linux/amd64,linux/arm64

      - name: Build y Push — Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          platforms: linux/amd64,linux/arm64
          build-args: |
            NEXT_PUBLIC_API_URL=https://crm.freelux.mx

      - name: Escanear imagen backend con Trivy
        uses: aquasecurity/trivy-action@master
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          image-ref: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:latest"
          format: "sarif"
          output: "trivy-results-backend.sarif"
          severity: "CRITICAL,HIGH"
        continue-on-error: true

      - name: Subir resultados Trivy a GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        with:
          sarif_file: "trivy-results-backend.sarif"
        continue-on-error: true

  # ─────────────────────────────────────────────────────────────
  # 5. Deploy a Staging (trigger manual o push a main)
  # ─────────────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy — Staging
    runs-on: ubuntu-latest
    needs: docker-build
    environment: staging
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_staging == 'true')

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: "v1.29.0"

      - name: Configurar kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Actualizar imagen en manifiestos
        run: |
          BACKEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:sha-$(git rev-parse --short HEAD)"
          FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:sha-$(git rev-parse --short HEAD)"

          sed -i "s|ghcr.io/abgc757/crm_freelux/backend:latest|${BACKEND_IMAGE}|g" infra/k8s/backend-deployment.yaml
          sed -i "s|ghcr.io/abgc757/crm_freelux/frontend:latest|${FRONTEND_IMAGE}|g" infra/k8s/frontend-deployment.yaml

      - name: Aplicar manifiestos Kubernetes
        run: |
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/configmap.yaml
          kubectl apply -f infra/k8s/secrets.yaml --validate=false
          kubectl apply -f infra/k8s/postgres-statefulset.yaml
          kubectl apply -f infra/k8s/redis-deployment.yaml
          kubectl apply -f infra/k8s/backend-deployment.yaml
          kubectl apply -f infra/k8s/frontend-deployment.yaml
          kubectl apply -f infra/k8s/ingress.yaml

      - name: Esperar rollout del backend
        run: |
          kubectl rollout status deployment/freelux-backend -n freelux-crm --timeout=300s

      - name: Esperar rollout del frontend
        run: |
          kubectl rollout status deployment/freelux-frontend -n freelux-crm --timeout=300s

      - name: Verificar health del staging
        run: |
          sleep 10
          kubectl run health-check --image=curlimages/curl --restart=Never --rm -i \
            -n freelux-crm -- \
            curl -sf http://backend-service:8000/health || echo "Health check failed"

      - name: Notificar éxito del deploy
        if: success()
        run: |
          echo "Deploy exitoso a staging — SHA: $(git rev-parse --short HEAD)"
          echo "Backend: https://crm.freelux.mx/api/v1/"
          echo "Frontend: https://crm.freelux.mx"
