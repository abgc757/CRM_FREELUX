name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ferrecrm_test
          POSTGRES_USER: ferrecrm
          POSTGRES_PASSWORD: ferrecrm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run unit tests
        run: |
          cd backend
          python -m pytest tests/unit/ -v --cov=app --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://ferrecrm:ferrecrm@localhost:5432/ferrecrm_test
          DATABASE_URL_SYNC: postgresql://ferrecrm:ferrecrm@localhost:5432/ferrecrm_test
          SECRET_KEY: test-secret-key
          REDIS_URL: redis://localhost:6379/0

      - name: Run integration tests
        run: |
          cd backend
          python -m pytest tests/integration/ -v --cov=app --cov-report=xml --cov-append
        env:
          DATABASE_URL: postgresql+asyncpg://ferrecrm:ferrecrm@localhost:5432/ferrecrm_test
          DATABASE_URL_SYNC: postgresql://ferrecrm:ferrecrm@localhost:5432/ferrecrm_test
          SECRET_KEY: test-secret-key
          REDIS_URL: redis://localhost:6379/0

      - name: Run e2e tests
        run: |
          cd backend
          python -m pytest tests/e2e/ -v --cov=app --cov-report=xml --cov-append
        env:
          DATABASE_URL: postgresql+asyncpg://ferrecrm:ferrecrm@localhost:5432/ferrecrm_test
          DATABASE_URL_SYNC: postgresql://ferrecrm:ferrecrm@localhost:5432/ferrecrm_test
          SECRET_KEY: test-secret-key
          REDIS_URL: redis://localhost:6379/0

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint
        run: |
          cd frontend
          npm run lint

      - name: Build
        run: |
          cd frontend
          npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t ferrecrm/backend:latest backend/

      - name: Build frontend image
        run: docker build -t ferrecrm/frontend:latest frontend/
