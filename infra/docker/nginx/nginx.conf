worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ─────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # ── Gzip ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json
               application/javascript application/rss+xml
               application/atom+xml image/svg+xml;

    # ── Rate limiting ────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ── Upstream servers ─────────────────────────────────────────
    upstream backend_api {
        least_conn;
        server backend:8000 max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend_app {
        server frontend:3000;
        keepalive 16;
    }

    # ── HTTP → HTTPS redirect (producción) ──────────────────────
    # server {
    #     listen 80;
    #     server_name crm.freelux.mx;
    #     return 301 https://$host$request_uri;
    # }

    # ── Servidor principal ───────────────────────────────────────
    server {
        listen 80;
        server_name localhost crm.freelux.mx;

        # Seguridad
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;

        # ── Frontend (Next.js) ────────────────────────────────────
        location / {
            proxy_pass http://frontend_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 60s;
        }

        # ── Backend API ────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
        }

        # ── Auth endpoints (rate limit estricto) ──────────────────
        location /api/v1/auth/login {
            limit_req zone=auth_limit burst=3 nodelay;
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── OpenAPI docs ──────────────────────────────────────────
        location /docs {
            proxy_pass http://backend_api/docs;
            proxy_set_header Host $host;
        }

        location /redoc {
            proxy_pass http://backend_api/redoc;
            proxy_set_header Host $host;
        }

        location /openapi.json {
            proxy_pass http://backend_api/openapi.json;
            proxy_set_header Host $host;
        }

        # ── Health check ──────────────────────────────────────────
        location /health {
            proxy_pass http://backend_api/health;
            access_log off;
        }

        # ── Archivos estáticos ────────────────────────────────────
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff2|woff|ttf|svg)$ {
            proxy_pass http://frontend_app;
            expires 30d;
            add_header Cache-Control "public, no-transform";
        }

        # ── Métricas Prometheus (solo interno) ────────────────────
        location /metrics {
            allow 172.0.0.0/8;
            allow 10.0.0.0/8;
            deny all;
            proxy_pass http://backend_api/metrics;
        }
    }

    # ── HTTPS (producción — descomentar con cert válido) ─────────
    # server {
    #     listen 443 ssl http2;
    #     server_name crm.freelux.mx;
    #
    #     ssl_certificate /etc/nginx/ssl/fullchain.pem;
    #     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #     ssl_session_cache shared:SSL:10m;
    #     ssl_session_timeout 10m;
    #     add_header Strict-Transport-Security "max-age=63072000" always;
    #     # ... (mismo bloque location que arriba)
    # }
}
