apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: freelux-crm
  labels:
    app: freelux-backend
spec:
  selector:
    app: freelux-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freelux-backend
  namespace: freelux-crm
  labels:
    app: freelux-backend
    app.kubernetes.io/name: freelux-crm
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: freelux-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: freelux-backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: backend
          image: ghcr.io/abgc757/crm_freelux/backend:latest
          imagePullPolicy: Always
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: freelux-config
            - secretRef:
                name: freelux-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freelux-celery-worker
  namespace: freelux-crm
  labels:
    app: freelux-celery-worker
    app.kubernetes.io/name: freelux-crm
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: freelux-celery-worker
  template:
    metadata:
      labels:
        app: freelux-celery-worker
    spec:
      containers:
        - name: celery-worker
          image: ghcr.io/abgc757/crm_freelux/backend:latest
          imagePullPolicy: Always
          command: ["celery", "-A", "app.tasks.celery_app", "worker", "-l", "info", "--concurrency=4"]
          envFrom:
            - configMapRef:
                name: freelux-config
            - secretRef:
                name: freelux-secrets
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(DATABASE_USER):$(DATABASE_PASSWORD)@$(DATABASE_HOST):$(DATABASE_PORT)/$(DATABASE_NAME)"
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "800m"
              memory: "512Mi"
