apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferrecrm-backend
  labels:
    app: ferrecrm
    component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ferrecrm
      component: backend
  template:
    metadata:
      labels:
        app: ferrecrm
        component: backend
    spec:
      containers:
        - name: backend
          image: ferrecrm/backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ferrecrm-secrets
                  key: database-url
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ferrecrm-secrets
                  key: secret-key
            - name: REDIS_URL
              value: "redis://redis:6379/0"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: ferrecrm
    component: backend
  ports:
    - port: 8000
      targetPort: 8000
