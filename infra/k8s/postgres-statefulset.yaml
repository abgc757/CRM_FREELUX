apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app: ferrecrm
    component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: ferrecrm
      component: database
  template:
    metadata:
      labels:
        app: ferrecrm
        component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: "ferrecrm"
            - name: POSTGRES_USER
              value: "ferrecrm"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: postgres-password
          volumeMounts:
            - name: pgdata
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
  volumeClaimTemplates:
    - metadata:
        name: pgdata
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
spec:
  selector:
    app: ferrecrm
    component: database
  ports:
    - port: 5432
      targetPort: 5432
