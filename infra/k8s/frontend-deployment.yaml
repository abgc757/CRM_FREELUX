apiVersion: apps/v1
kind: Deployment
metadata:
  name: ferrecrm-frontend
  labels:
    app: ferrecrm
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ferrecrm
      component: frontend
  template:
    metadata:
      labels:
        app: ferrecrm
        component: frontend
    spec:
      containers:
        - name: frontend
          image: ferrecrm/frontend:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector:
    app: ferrecrm
    component: frontend
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ferrecrm-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
    - host: ferrecrm.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
