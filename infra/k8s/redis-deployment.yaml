apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app: ferrecrm
    component: redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ferrecrm
      component: redis
  template:
    metadata:
      labels:
        app: ferrecrm
        component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  selector:
    app: ferrecrm
    component: redis
  ports:
    - port: 6379
      targetPort: 6379
