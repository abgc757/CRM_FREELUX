# PLANTILLA — NO SUBIR VALORES REALES AL REPOSITORIO
# Uso: kubectl create secret generic freelux-secrets \
#        --from-env-file=.env.staging -n freelux-crm
# O bien reemplazar los valores <BASE64_...> con:
#   echo -n "valor" | base64
apiVersion: v1
kind: Secret
metadata:
  name: freelux-secrets
  namespace: freelux-crm
  labels:
    app.kubernetes.io/name: freelux-crm
type: Opaque
data:
  # echo -n "freelux" | base64
  DATABASE_USER: <BASE64_DATABASE_USER>
  # echo -n "supersecretpassword" | base64
  DATABASE_PASSWORD: <BASE64_DATABASE_PASSWORD>
  # echo -n "your-jwt-secret-key-min-32-chars" | base64
  SECRET_KEY: <BASE64_SECRET_KEY>
  # echo -n "your-twilio-account-sid" | base64
  TWILIO_ACCOUNT_SID: <BASE64_TWILIO_ACCOUNT_SID>
  # echo -n "your-twilio-auth-token" | base64
  TWILIO_AUTH_TOKEN: <BASE64_TWILIO_AUTH_TOKEN>
  # echo -n "your-twilio-whatsapp-number" | base64
  TWILIO_WHATSAPP_FROM: <BASE64_TWILIO_WHATSAPP_FROM>
  # echo -n "your-sendgrid-api-key" | base64
  SENDGRID_API_KEY: <BASE64_SENDGRID_API_KEY>
