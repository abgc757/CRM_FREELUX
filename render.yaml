# =============================================================================
# render.yaml — Infraestructura de CRM FreeLux en Render.com
#
# Servicios:
#   - crm-freelux-backend   Web Service (FastAPI + Uvicorn)
#   - crm-freelux-frontend  Web Service (Next.js)
#   - crm-freelux-db        PostgreSQL 16 (managed)
#   - crm-freelux-redis     Redis (managed)
#
# Uso: New → Blueprint en el dashboard de Render
# Docs: https://render.com/docs/infrastructure-as-code
# =============================================================================

databases:
  - name: crm-freelux-db
    databaseName: freelux_crm
    user: freelux
    plan: free
    region: oregon

services:
  # ---------------------------------------------------------------------------
  # Backend — FastAPI
  # ---------------------------------------------------------------------------
  - type: web
    name: crm-freelux-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Sobreescribe el CMD del Dockerfile: corre migraciones y luego uvicorn
    dockerCommand: bash start.sh
    region: oregon
    plan: free
    healthCheckPath: /health

    envVars:
      # PostgreSQL — Render inyecta la URL interna automáticamente.
      # IMPORTANTE: en el dashboard cambiar "postgresql://" por "postgresql+asyncpg://"
      - key: DATABASE_URL
        fromDatabase:
          name: crm-freelux-db
          property: connectionString

      # Redis
      - key: REDIS_URL
        fromService:
          name: crm-freelux-redis
          type: redis
          property: connectionString

      # JWT — Render genera un secreto aleatorio seguro
      - key: SECRET_KEY
        generateValue: true

      - key: ALGORITHM
        value: HS256

      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # CORS — URL pública del frontend
      - key: FRONTEND_URL
        fromService:
          name: crm-freelux-frontend
          type: web
          property: host

      - key: MEDIA_DIR
        value: /app/media

      # Facturama — configurar manualmente en el dashboard de Render
      - key: FACTURAMA_MOCK
        value: "true"

      - key: FACTURAMA_SANDBOX
        value: "true"

      - key: FACTURAMA_USER
        value: ""

      - key: FACTURAMA_PASSWORD
        value: ""

  # ---------------------------------------------------------------------------
  # Frontend — Next.js
  # ---------------------------------------------------------------------------
  - type: web
    name: crm-freelux-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    region: oregon
    plan: free

    dockerBuildArgs:
      - key: NEXT_PUBLIC_API_URL
        value: https://crm-freelux-backend.onrender.com/api/v1

    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://crm-freelux-backend.onrender.com/api/v1

  # ---------------------------------------------------------------------------
  # Redis
  # ---------------------------------------------------------------------------
  - type: redis
    name: crm-freelux-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []
